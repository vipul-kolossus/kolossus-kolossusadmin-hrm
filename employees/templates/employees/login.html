{% extends 'base.html' %}
{% block auth_content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HRM Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: none; }
        .login-header { background: linear-gradient(135deg, #2563eb, #1d4ed8); border-radius: 16px 16px 0 0; padding: 30px; text-align: center; }
        .form-control { border-radius: 8px; padding: 12px 15px; border: 1px solid #e2e8f0; }
        .form-control:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn-login { background: #2563eb; border: none; border-radius: 8px; padding: 12px; font-weight: 600; }
        .btn-login:hover { background: #1d4ed8; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-10">
            <div class="card login-card">
                <div class="login-header">
                    <i class="fas fa-users-cog fa-3x text-white mb-3"></i>
                    <h3 class="text-white fw-bold">HRM Pro</h3>
                    <p class="text-white-50 mb-0">Human Resource Management</p>
                </div>
                <div class="card-body p-4">
                    <h5 class="text-center mb-4 text-muted">Sign in to your account</h5>
                    <form method="post">
                        {% csrf_token %}
                        {% if form.errors %}
                        <div class="alert alert-danger">Invalid username or password.</div>
                        {% endif %}
                        <div class="mb-3">
                            <label class="form-label fw-600">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                                <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-login btn-primary w-100">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                    </form>
                    <p class="text-center text-muted mt-3 small">Default: admin / admin123</p>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
