name: Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest pytest-django
      - run: python -m pytest tests/ -v
        env:
          DJANGO_SETTINGS_MODULE: hrm_project.settings
